<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Revoked</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 30px;
            line-height: 1.5;
            font-size: 16px;
        }

        .btn {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #20bd5a;
        }

        .btn-secondary {
            background-color: #444;
            margin-top: 10px;
            font-size: 14px;
            padding: 10px 20px;
        }

        .btn-secondary:hover {
            background-color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚠️ License Revoked</h1>
        <p>Your license key is no longer valid or has been revoked.</p>
        <p>Contact us here to buy a license:</p>

        <button class="btn" id="contactBtn">
            <span>📱</span> Contact Support on WhatsApp
        </button>

        <div style="margin-top: 15px;">
            <button class="btn btn-secondary" id="enterKeyBtn">
                <span>🔑</span> Enter New License Key
            </button>
        </div>
    </div>

    <script>
        const { shell, ipcRenderer } = require('electron');

        document.getElementById('contactBtn').addEventListener('click', () => {
            shell.openExternal('https://wa.me/message/RQAP2VWXTUEPG1');
        });

        document.getElementById('enterKeyBtn').addEventListener('click', () => {
            ipcRenderer.send('retry-license');
        });
    </script>
</body>

</html>
