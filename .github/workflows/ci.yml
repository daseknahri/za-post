name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    env:
      # The unit + anti-spam tests only require the JS packages (puppeteer-extra/stealth are loaded at require-time),
      # they never launch a browser — so skip the ~100 MB Electron + ~170 MB Chromium binary downloads. Those were the
      # single biggest source of slow/flaky `npm ci` in CI; the app ships its OWN bundled Chromium (chrome-bin) anyway.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      PUPPETEER_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # LTS; `node --test "tests/**/*.test.js"` glob expansion needs >= 21
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit + integration tests
        run: npm test
      - name: Anti-spam end-to-end test
        run: node scripts/test-antispam.js

  build-portable:
    # Build the send-ready portable zip on a version tag (e.g. v1.2.0).
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build portable
        run: npm run pack:portable
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: za-post-portable
          path: dist/*.zip
          if-no-files-found: error
